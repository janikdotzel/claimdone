[tool.uv]
required-version = "==0.8.3"

[tool.uv.workspace]
members = ["services/api"]

[tool.ruff]
line-length = 100
src = ["services/api/src", "."]
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM", "RUF"]

[tool.mypy]
python_version = "3.12"
strict = true
warn_unreachable = true

[tool.pytest.ini_options]
addopts = "--strict-config --strict-markers"
pythonpath = ["services/api/src"]
testpaths = ["services/api/tests", "scripts/tests"]
